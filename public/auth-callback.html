<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1">
  <title>Google Calendar Authorization</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid white;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .message {
      font-size: 18px;
      margin-top: 1rem;
    }
    .error {
      color: #ffcccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="message" id="message">Completing authorization...</div>
  </div>

  <script>
    // Get the authorization code from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const error = urlParams.get('error');

    const messageEl = document.getElementById('message');

    if (error) {
      messageEl.textContent = `Authorization failed: ${error}`;
      messageEl.classList.add('error');
      setTimeout(() => window.close(), 3000);
    } else if (code) {
      // Send the code back to the parent window
      if (window.opener) {
        window.opener.postMessage({
          type: 'google-oauth-success',
          code: code
        }, window.location.origin);
        messageEl.textContent = 'Authorization successful! Closing...';
        setTimeout(() => window.close(), 1000);
      } else {
        messageEl.textContent = 'Error: Could not communicate with parent window';
        messageEl.classList.add('error');
      }
    } else {
      messageEl.textContent = 'No authorization code received';
      messageEl.classList.add('error');
      setTimeout(() => window.close(), 3000);
    }
  </script>
</body>
</html>
